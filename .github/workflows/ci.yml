name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Flutter のセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 依存関係のインストール
        run: flutter pub get

      - name: 静的解析
        run: flutter analyze

      - name: フォーマットチェック
        run: dart format --output=none --set-exit-if-changed .

      - name: テスト実行（カバレッジ付き）
        run: flutter test --coverage

      - name: カバレッジレポートのアップロード
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
        continue-on-error: true  # Codecov未設定でも失敗させない

  build-android:
    name: Android ビルド確認
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Java のセットアップ
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Flutter のセットアップ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: .env の作成（CI用ダミー）
        run: cp .env.example .env

      - name: 依存関係のインストール
        run: flutter pub get

      - name: Android APK ビルド
        run: flutter build apk --debug
